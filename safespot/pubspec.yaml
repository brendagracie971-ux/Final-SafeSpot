name: safespot
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  google_maps_flutter: ^2.17.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  permission_handler: ^12.0.1
  speech_to_text: ^7.4.0
  sensors_plus: ^7.0.0
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.3.0
  sqflite: ^2.4.2+1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.2.2
  url_launcher: ^6.3.2
  connectivity_plus: ^7.1.1
  flutter_spinkit: ^5.2.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1


flutter:
  uses-material-design: true
assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

  